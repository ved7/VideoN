services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_annotations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d video_annotations"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./deploy/minio-cors.json:/config/minio-cors.json:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing local/video-assets
        mc cors set local/video-assets /config/minio-cors.json
        exit 0

  api:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/video_annotations
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: video-assets
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      S3_FORCE_PATH_STYLE: "true"
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_BASE_URL: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-4.1-nano}
      OPENAI_SUMMARY_TIMEOUT_SECONDS: ${OPENAI_SUMMARY_TIMEOUT_SECONDS:-8}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker -l info
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/video_annotations
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: video-assets
      S3_REGION: us-east-1
      S3_USE_SSL: "false"
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  minio_data:
