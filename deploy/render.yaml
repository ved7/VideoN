services:
  - type: web
    name: videon-api
    plan: free
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: ./start-render.sh
    healthCheckPath: /api/health/ready
    envVars:
      - key: APP_NAME
        value: VideoN
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_PUBLIC_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_USE_SSL
        value: "true"
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: S3_CREATE_BUCKET_ON_STARTUP
        value: "false"
