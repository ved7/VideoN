services:
  - type: web
    name: videon-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/ready
    envVars:
      - key: APP_NAME
        value: VideoN
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_PUBLIC_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_REGION
        value: us-east-1
      - key: S3_USE_SSL
        value: "true"
      - key: S3_FORCE_PATH_STYLE
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: S3_CREATE_BUCKET_ON_STARTUP
        value: "false"

  - type: worker
    name: videon-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.tasks.celery_app.celery_app worker -l info
    envVars:
      - key: DATABASE_URL
        fromService:
          type: web
          name: videon-api
          envVarKey: DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: web
          name: videon-api
          envVarKey: REDIS_URL
      - key: S3_ENDPOINT_URL
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_ENDPOINT_URL
      - key: S3_PUBLIC_ENDPOINT_URL
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_PUBLIC_ENDPOINT_URL
      - key: S3_ACCESS_KEY
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_ACCESS_KEY
      - key: S3_SECRET_KEY
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_SECRET_KEY
      - key: S3_BUCKET_NAME
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_BUCKET_NAME
      - key: S3_REGION
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_REGION
      - key: S3_USE_SSL
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_USE_SSL
      - key: S3_FORCE_PATH_STYLE
        fromService:
          type: web
          name: videon-api
          envVarKey: S3_FORCE_PATH_STYLE

  - type: web
    name: videon-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
